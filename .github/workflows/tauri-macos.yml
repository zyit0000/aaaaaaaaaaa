name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.15"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Intel macOS target
        run: rustup target add x86_64-apple-darwin

      - name: Clean + install deps
        working-directory: opiumwareui
        run: |
          rm -rf node_modules
          npm ci --include=dev
          npm ls lucide-react
          node -e "console.log(require.resolve('lucide-react/package.json'))"

      - name: Verify TypeScript sees lucide-react
        working-directory: opiumwareui
        run: npx tsc --noEmit

      - name: Build Tauri app (DMG)
        working-directory: opiumwareui
        run: npm run tauri build -- --target x86_64-apple-darwin

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: opiumwareui/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
