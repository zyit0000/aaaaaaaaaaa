name: Build macOS DMG

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opiumwareui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: opiumwareui
        run: npm ci

      - name: Build Tauri app (DMG)
        working-directory: opiumwareui
        run: npm run tauri build

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: opiumwareui/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
